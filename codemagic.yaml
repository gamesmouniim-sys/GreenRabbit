workflows:
  testFlight:
    name: Sahzad
    integrations:
      app_store_connect: Ajwah Shahzad
    environment:
      xcode: latest
      ios_signing:
        bundle_identifier: com.darkpanel.rabbit
        provisioning_profiles:
          - GreenProfile
        certificates:
          - ShahzadCer
    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcodebuild \
            -project "Dark Aura Panel.xcodeproj" \
            -scheme "Dark Aura Panel" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/DarkAuraPanel.xcarchive" \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/DarkAuraPanel.xcarchive" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath "$CM_BUILD_DIR/ipa"
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
    publishing:
      email:
        recipients:
          - moja.stores@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
      
